{% extends "base.html" %}
{% block title %}Create Account — DermAI{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <span class="logo-text auth-logo">Derm<em>AI</em></span>
      <h1>Create your account</h1>
      <p>Free forever — no credit card required</p>
    </div>
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Choose a username" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Min 6 characters" required autocomplete="new-password" />
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat your password" required autocomplete="new-password" />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create Account →</button>
    </form>
    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
  </div>
</div>
{% endblock %}
